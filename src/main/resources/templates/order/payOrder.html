<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pay Order</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
          crossorigin="anonymous">
</head>
<body>
<div class="container my-2">
    <h3>Pay Order</h3>

    <p><strong>Order ID:</strong> <span th:text="${order.id}"></span></p>
    <p><strong>Author:</strong> <span th:text="${order.author}"></span></p>
    <p><strong>Status:</strong> <span th:text="${order.status}"></span></p>

    <form th:action="@{'/order/pay/' + ${order.id}}" method="post">
        <div class="form-group">
            <label for="method">Payment Method</label>
            <select class="form-control mb-4 col-4" id="method" name="method">
                <option value="VOUCHER_CODE">Voucher Code</option>
                <option value="CASH_ON_DELIVERY">Cash on Delivery</option>
            </select>
        </div>

        <div class="form-group" id="voucherGroup">
            <label for="voucherCode">Voucher Code</label>
            <input type="text" class="form-control mb-4 col-4" id="voucherCode" name="voucherCode"
                   placeholder="Enter voucher code">
        </div>

        <div class="form-group" id="codGroup">
            <label for="address">Address</label>
            <input type="text" class="form-control mb-4 col-4" id="address" name="address"
                   placeholder="Enter delivery address">
            <label for="deliveryFee">Delivery Fee</label>
            <input type="text" class="form-control mb-4 col-4" id="deliveryFee" name="deliveryFee"
                   placeholder="Enter delivery fee">
        </div>

        <button type="submit" class="btn btn-primary">Pay</button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>
</html>
